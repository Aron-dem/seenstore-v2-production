<!DOCTYPE html>
<html lang="ar" dir="auto">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />

    <!-- ─── Primary SEO ──────────────────────────────────────────────── -->
    <title>SEENSTORE | ملابس ستريت وير مصر — Egyptian Streetwear Brand</title>
    <meta name="description"
      content="SEENSTORE — أحدث تشكيلات الستريت وير المصري. هوديز، كارجو، تيشيرتات، وإكسسوارات بأعلى جودة. شحن لجميع أنحاء مصر. تصاميم مخصصة على الطلب." />
    <meta name="keywords"
      content="seenstore, ستريت وير مصر, streetwear egypt, ملابس شبابية مصر, هوديز مصر, كارجو بانت مصر, تيشيرتات مصر, ملابس هيب هوب مصر, تصميم مخصص ملابس, urban fashion egypt, egyptian streetwear brand, ملابس برند مصري, hoodie egypt, cargo pants egypt, oversized tee egypt" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="author" content="SEENSTORE" />
    <meta name="theme-color" content="#E63946" />

    <!-- ─── Canonical & Language ──────────────────────────────────────── -->
    <link rel="canonical" href="https://seenstore.com/" />
    <link rel="alternate" hreflang="ar" href="https://seenstore.com/" />
    <link rel="alternate" hreflang="en" href="https://seenstore.com/" />
    <link rel="alternate" hreflang="x-default" href="https://seenstore.com/" />

    <meta property="og:type"             content="website" />

    <meta property="og:url"              content="https://seenstore.com/" />
    <meta property="og:image"            content="https://seenstore.com/opengraph.jpg" />

    <meta property="og:image:alt"        content="SEENSTORE — Egyptian Streetwear Brand" />
    <meta property="og:locale"           content="ar_EG" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- ─── Twitter Card ─────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="SEENSTORE | ملابس ستريت وير مصر" />

    <!-- ─── Favicon & Icons ──────────────────────────────────────────── -->
    <link rel="icon"             type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon"    href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- ─── Fonts ────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bebas+Neue&family=Cairo:wght@400;500;600;700;800;900&display=swap"
          rel="stylesheet" />

    <!-- ─── JSON-LD: ClothingStore ───────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ClothingStore",
      "name": "SEENSTORE",
      "alternateName": ["سين ستور", "SEEN STORE"],
      "description": "SEENSTORE هو برند ستريت وير مصري يقدم أحدث تشكيلات الملابس الشبابية من هوديز وكارجو وتيشيرتات وإكسسوارات مع خدمة التصميم المخصص.",
      "url": "https://seenstore.com",
      "logo": {
        "@type": "ImageObject",
        "url": "https://seenstore.com/favicon.svg",
        "width": "512",
        "height": "512"
      },
      "image": "https://seenstore.com/opengraph.jpg",
      "priceRange": "199 EGP - 1299 EGP",
      "currenciesAccepted": "EGP",
      "paymentAccepted": "Cash, Visa, Mastercard",
      "areaServed": {
        "@type": "Country",
        "name": "Egypt"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "SEENSTORE Collection",
        "itemListElement": [
          { "@type": "OfferCatalog", "name": "T-Shirts" },
          { "@type": "OfferCatalog", "name": "Hoodies" },
          { "@type": "OfferCatalog", "name": "Pants" },
          { "@type": "OfferCatalog", "name": "Accessories" }
        ]
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "email": "seifabdelrahman858@gmail.com",
        "availableLanguage": ["Arabic", "English"]
      }
    }
    </script>

    <!-- ─── JSON-LD: WebSite (enables Google Sitelinks Search Box) ───── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SEENSTORE",
      "url": "https://seenstore.com",
      "description": "Egyptian Streetwear Brand — ملابس ستريت وير مصر",
      "inLanguage": ["ar", "en"],
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://seenstore.com/shop?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
